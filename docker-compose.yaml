version: "3.8"

services:
  mongo:
    image: mongo:6
    container_name: mongodb_container
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_storage:/data/db

  server:
    build: ./server
    container_name: express_container
    restart: always
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://mongo:27017/taskdb
      JWT_SECRET: mysecretkey
      PORT: 5000
    depends_on:
      - mongo

  client:
    build: ./client
    container_name: react_container
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  mongo_storage: