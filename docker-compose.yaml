services:

  mongo:
    image: mongo:6
    container_name: mongodb_container
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  server:
    build: ./server
    container_name: node_backend
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://mongo:27017/taskdb
      JWT_SECRET: mysecret
      PORT: 5000
    depends_on:
      - mongo

volumes:
  mongo_data: